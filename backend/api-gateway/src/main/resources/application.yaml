server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: service-utilisateurs
          uri: lb://service-utilisateurs
          predicates:
            - Path=/api/auth/**, /api/users/**

        - id: service-offres
          uri: lb://service-offres
          predicates:
            - Path=/api/offres/**

        - id: service-suivi
          uri: lb://service-suivi
          predicates:
            - Path=/api/suivi/**

        - id: service-optimisation
          uri: lb://service-optimisation
          predicates:
            - Path=/api/itineraires/**

        - id: service-alertes
          uri: lb://service-alertes
          predicates:
            - Path=/api/alertes/**

        - id: service-messagerie
          uri: lb://service-messagerie
          predicates:
            - Path=/api/messages/**, /ws/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: "agriconnect@2026#camer123456789"